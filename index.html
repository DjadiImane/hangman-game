<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>quiz</title>
    <link
      href="https://fonts.googleapis.com/css?family=Jua:regular"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="fisrtfenetre">
        <img src="images/MAN.svg" alt="manimage" class="man" />
        <img src="images/Ellipse 1.svg" class="shad" />
        <div class="grandmsg">
          <div class="triangle"></div>
          <div class="speech">
            <div class="borderinterieur">
              <div class="txtmsg">
                <p>
                  A small gift <br />
                  to begin
                  <img src="images/heart.svg" alt="heart image" class="heart" />
                </p>
              </div>
            </div>
          </div>
        </div>

        <button class="btn_start" onclick="nextfentere()">Let's start</button>
      </div>

      <div class="secfenetre">
        <p class="titre">Choose a category:</p>
        <div class="cathegories">
          <div class="history" onclick="startgame('history')">
            <div class="gauche">
              <img src="images/Greek Helmet.svg" alt="history img" />
              <p>History</p>
            </div>
            <img src="images/sup.svg" alt="superieur img" id="sup" />
          </div>
          <div class="animals" onclick="startgame('animals')">
            <div class="gauche">
              <img src="images/Pet Commands Train.svg" alt="animals img" />
              <p>Animals</p>
            </div>
            <img src="images/sup.svg" alt="superieur img" id="sup" />
          </div>
          <div class="books" onclick="startgame('books')">
            <div class="gauche">
              <img src="images/Books.svg" alt="books img" />
              <p>Books</p>
            </div>
            <img src="images/sup.svg" alt="superieur img" id="sup" />
          </div>
        </div>
      </div>
    </div>
    <!-- 3fenetre -->
    <div class="thirdfenetrehide">
      <div class="top">
        <div class="photoman"></div>
        <div class="hinttime">
          <div class="topbar">
            <p>Incorrect guesses:<span class="nbguesse"></span></p>
            <p class="timing"></p>
            <button class="btnretour" onclick="retourchoix()">-></button>
          </div>
          <div class="hint"></div>
          <div class="name"></div>
        </div>
      </div>
      <div class="alpha">
        <div class="firstline">
          <button>A</button>
          <button>B</button>
          <button>C</button>
          <button>D</button>
          <button>E</button>
          <button>F</button>
          <button>G</button>
          <button>H</button>
          <button>I</button>
          <button>J</button>
        </div>
        <div class="secline">
          <button>K</button>
          <button>L</button>
          <button>M</button>
          <button>N</button>
          <button>O</button>
          <button>P</button>
          <button>Q</button>
          <button>R</button>
          <button>S</button>
        </div>
        <div class="thirdclass">
          <button>T</button>
          <button>U</button>
          <button>V</button>
          <button>W</button>
          <button>X</button>
          <button>Y</button>
          <button>Z</button>
        </div>
      </div>
    </div>
    <div class="gameover">
      <img src="images/lost.gif" alt="los gif" />
      <h1>Game Over!</h1>
      <p>The correct word was: <span class="correctnamegm">BLABLABLA</span></p>
      <button class="gameoverbtn" onclick="replay('gameover')">
        Try again
      </button>
    </div>
    <div class="win">
      <img src="images/victory.gif" alt="victory gif" />
      <h1>Congrats!</h1>
      <p>You found the word: <span class="correctname"></span></p>
      <button class="winbtn" onclick="replay('win')">Play again</button>
    </div>
    <script src="script.js"></script>
  </body>
</html>
